# Safemap IF_0042 → public/data/ev-stations-summary.json (아티팩트)
#
# API 키는 저장소의 .env / .env.local 에 넣지 말 것(이 파일들은 gitignore).
# 반드시 GitHub Actions Secrets 만 사용:
#   Settings → Secrets and variables → actions → New repository secret
#   이름: VITE_SAFEMAP_SERVICE_KEY 또는 SAFEMAP_SERVICE_KEY
#
name: ev-summary

on:
  workflow_dispatch:
  # 주기 생성: 시크릿 설정 후 아래 주석 해제
  # schedule:
  #   - cron: '0 3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build EV stations summary JSON
        env:
          VITE_SAFEMAP_SERVICE_KEY: ${{ secrets.VITE_SAFEMAP_SERVICE_KEY }}
          SAFEMAP_SERVICE_KEY: ${{ secrets.SAFEMAP_SERVICE_KEY }}
        run: npm run build:ev-summary

      - name: Inspect artifact
        run: npm run inspect:ev-summary

      - name: Upload summary JSON
        uses: actions/upload-artifact@v4
        with:
          name: ev-stations-summary
          path: public/data/ev-stations-summary.json
          retention-days: 14
